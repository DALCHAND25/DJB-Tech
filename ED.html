<!DOCTYPE html>
<html>
<head>
  <title>Employee Data Form</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      background: white;
      padding: 20px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    h2 {
      text-align: center;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    button:hover {
      background: darkgreen;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Employee Data</h2>

  <form id="empForm">

    <input type="date" name="date" required>

    <input type="text" name="name" placeholder="Employee Name" required>

    <input type="tel" name="mobile" placeholder="Mobile Number" required>

    <input type="email" name="email" placeholder="Email ID" required>

    <textarea name="address" placeholder="Address" required></textarea>

    <textarea name="remarks" placeholder="Remarks"></textarea>

    <button type="submit">Submit</button>

  </form>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxnGKoX-lPLCgOVd8kJpF88Mu6sBATtHU9O8SwodwiBf4K6RdBy8gBhqJzsmhiN4m8Z/exec";

document.getElementById("empForm").addEventListener("submit", function(e) {
  e.preventDefault();

  fetch(scriptURL, {
    method: "POST",
    body: new FormData(this)
  })
  .then(res => res.text())
  .then(data => {
    alert("Data Saved Successfully ✅");
    document.getElementById("empForm").reset();
  })
  .catch(err => {
    alert("Error ❌: " + err);
  });
});
</script>

</body>
</html>
