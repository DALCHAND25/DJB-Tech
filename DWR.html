<!DOCTYPE html>
<html>
<head>
  <title>Gate Pass System</title>
</head>

<body>

<h2>Gate Pass Entry</h2>

<input type="text" id="name" placeholder="Enter Name"><br><br>
<input type="text" id="sn" placeholder="Enter SN Number"><br><br>

<button onclick="sendData()">Submit</button>

<script>

// 🔴 यहाँ WEB APP URL डालना है
const scriptURL = "https://script.google.com/macros/s/AKfycbzLqH_rA8dNoDizHwf9W_B8T9ST3mejZ3X5f4hDNDtTXd54982iqC_AxMMNy5_hrFU/exec";

function sendData() {

  const data = {
    name: document.getElementById("name").value,
    sn: document.getElementById("sn").value
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(response => {
    alert("Gate Pass Saved!");
    console.log(response);
  })
  .catch(err => {
    alert("Error!");
    console.log(err);
  });

}

</script>

</body>
</html>
