<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batch Scanner App</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  background: #f2f3f7;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 20px;
  background: blue;
  color: white;
}

#reader {
  margin-top: 10px;
}

ul {
  padding-left: 15px;
}
</style>
</head>

<body>

<div class="container">

<h3>📦 Batch Scanner</h3>

<form id="form">

<label>Name</label>
<input type="text" name="name" required>

<label>Item</label>
<input type="text" name="item" required>

<label>Gate Pass</label>
<input type="text" name="gatepass">

<label>Serial Number</label>
<input type="text" id="serial">

<div id="reader"></div>
<button type="button" onclick="startScanner()">📷 Scan Serial</button>

<h4>Scanned Serial List</h4>
<ul id="serialList"></ul>

<label>Status</label>
<select name="status">
<option>OUT</option>
<option>IN</option>
</select>

<label>Remark</label>
<textarea name="remark"></textarea>

<button type="submit">Submit Batch</button>

</form>

</div>

<script>
let serialArray = [];
let scanner;

// 📷 Start Scanner
function startScanner() {
  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      if (!serialArray.includes(decodedText)) {
        serialArray.push(decodedText);

        let li = document.createElement("li");
        li.innerText = decodedText;

        // ❌ Remove button
        let btn = document.createElement("button");
        btn.innerText = "❌";
        btn.style.marginLeft = "10px";

        btn.onclick = function() {
          serialArray = serialArray.filter(sn => sn !== decodedText);
          li.remove();
        };

        li.appendChild(btn);
        document.getElementById("serialList").appendChild(li);
      }

      scanner.stop();
    }
  ).catch(err => alert("Camera Error: " + err));
}

// 🔗 Google Sheets URL
const scriptURL = "PASTE_YOUR_WEB_APP_URL_HERE";

// 🚀 Submit Batch
document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();

  if (serialArray.length === 0) {
    alert("⚠️ Please scan at least one serial");
    return;
  }

  const form = e.target;

  const data = {
    name: form.name.value,
    item: form.item.value,
    gatepass: form.gatepass.value,
    serials: serialArray,
    status: form.status.value,
    remark: form.remark.value
  };

  fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: { "Content-Type": "application/json" }
  })
  .then(() => {
    alert("✅ Batch Saved to Google Sheet");
    serialArray = [];
    document.getElementById("serialList").innerHTML = "";
    form.reset();
  })
  .catch(err => alert("❌ Error: " + err));
});
</script>

</body>
</html>
